###############################################################################
# Main configuration file                                                     #
# To override single property use --set                                       #
# To override multiple, provide another values-override.yaml with the -f flag #
# See https://helm.sh/docs/chart_template_guide/values_files/                 #
###############################################################################

#########################
# Global Configurations #
#########################

global:
  # Overrides image.registry
  # Can be used to override it globally when using umbrella charts.
  imageRegistry: ""

  # Inserts additional pull secret references together along with any from .Values.image.pullSecrets
  # Can be used to override it globally when using umbrella charts.
  # Values are processed as Helm templates.
  # Ref: https://kubernetes.io/docs/concepts/configuration/secret/#using-imagepullsecrets
  #
  # Example:
  # imagePullSecrets:
  #   - name: my-pull-secret
  imagePullSecrets: []

###############################
#   Metadata Configurations   #
# Naming and labels overrides #
###############################

# Overrides the name of the chart affecting the names of the n8n resources.
nameOverride: ""

# Overrides the naming of all n8n resources, effectively removing the chart's name and the release name prefix.
# This override takes precedence over anything in .Values.nameOverride
fullnameOverride: ""

# Overrides the deployment namespace in case of multi-namespace deployments, for example when using umbrella charts where some sub-charts should be
# deployed in different namespaces.
# This affects every resource deployed by this chart.
# The default value is .Release.Namespace if this is left unspecified.
namespaceOverride: ""

# Additional common labels to add to all n8n resources.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
#
# Example:
# labels:
#   foo: bar
#   some-label: {{ .Values.someValue }}
labels: {}

# Additional common annotations to add to all n8n resources.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
#
# Example:
# annotations:
#   foo: bar
#   some-annotation: {{ .Values.someValue }}
annotations: {}

#####################################
# n8n Image Configurations #
#####################################

# Image configurations for n8n service.
# Ref: https://kubernetes.io/docs/concepts/containers/images/
image:
  # The registry that hosts the n8n image.
  # The default is to pull it from the official Docker registry, but this can be overridden to pull from other public or private registries.
  registry: maven.ontotext.com

  # The repository name of the n8n image.
  repository: graphrag-workflows

  # Image tag that corresponds to the version of n8n.
  # By default, the chart uses .Chart.AppVersion to construct the full image name.
  # Use this to override the value from .Chart.AppVersion and effectively deploy a custom n8n version.
  tag: ""

  # Expected SHA256 digest of the used n8n image, e.g. "sha256@abc"
  # Use the digest to make sure you are always deploying the exact same n8n image.
  # Defining this would override .Chart.AppVersion and image.tag
  digest: ""

  # Defines the policy for pulling images
  # Ref: https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy
  pullPolicy: IfNotPresent

  # Secrets for pulling n8n image from secured registries.
  # Values are processed as Helm templates.
  # Ref: https://kubernetes.io/docs/concepts/configuration/secret/#using-imagepullsecrets
  #
  # Example:
  # pullSecrets:
  #   - name: my-pull-secret
  pullSecrets: []

##########################
# Scaling Configurations #
##########################

# Number of n8n pods to be deployed as part of the Deployment resources.
replicas: 1

# Horizontal Pod Autoscaler configuration that can automatically scale the number of n8n pods based on
# resource utilization.
# Ref: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

################################
#      n8n Configurations      #
################################

# n8n runtime configuration settings.
# For reference, see https://docs.n8n.io/hosting/configuration/environment-variables
configuration:

  # The external URL at which GraphRAG N8N workflow engine would be accessible.
  # This can be a publicly available domain name, an internal one or even a Kubernetes service address.
  #
  # This configuration is used by the default ConfigMap to properly set the context paths for N8N.
  # It also configures the hostname in the default Ingress resource, if enabled.
  # The value is processed as a Helm template.
  #
  # Note: If the external URL uses HTTPS and the default Ingress is enabled, you have to configure .Values.ingress.tls
  #
  # Note: When deploying on a context path different from /, you need to properly configure the Ingress according to the requirements of the
  # Ingress controller implementation.
  externalUrl: http://n8n.127.0.0.1.nip.io/

  # n8n configurations injected as environment variables via templates/configmap.yaml
  environment:
    N8N_GRACEFUL_SHUTDOWN_TIMEOUT: "30"
    N8N_LOG_LEVEL: "info"
    DB_TYPE: "postgresdb"

  # Encryption key for n8n credentials.
  # By default, if not set, n8n will generate a random key on startup and will use it to encrypt all credentials.
  encryption:
    # Reference to a secret containing a field with the encryption key.
    # The value is processed as a Helm template.
    existingSecret: ""
    # Name of the key in the existing secret that contains the encryption key.
    # The default is N8N_ENCRYPTION_KEY, but it can be changed to map to a different secret key.
    secretKey: N8N_ENCRYPTION_KEY

  # A commercial license key is required for using enterprise features.
  # Ref: https://docs.n8n.io/hosting/configuration/environment-variables/licenses/#license-environment-variables
  license:
    # Reference to a secret containing a field with the n8n license key.
    # The value is processed as a Helm template.
    existingSecret: ""
    # Name of the key in the existing secret that contains the license.
    # The default is N8N_LICENSE_ACTIVATION_KEY, but it can be changed to map to a different secret key.
    secretKey: N8N_LICENSE_ACTIVATION_KEY
    # Dedicated tenant identifier for organizations using n8n Enterprise.
    tenantId: 1

  # Configurations for connecting n8n to a PostgreSQL database.
  # Ref: https://docs.n8n.io/hosting/configuration/environment-variables/database/#postgresql
  postgresdb:
    # Hostname of the PostgreSQL database.
    # The value is processed as a Helm template.
    host: postgres
    # Port of the PostgreSQL database.
    port: 5432
    # Name of the database to connect to in PostgreSQL.
    database: n8n
    # Credentials for connecting to the PostgreSQL database.
    credentials:
      # Reference to a secret containing the credentials for connecting to the PostgreSQL database.
      # The value is processed as a Helm template.
      existingSecret: ""
      # Name of the key in the existing secret that contains the username.
      usernameKey: DB_POSTGRESDB_USER
      # Name of the key in the existing secret that contains the password.
      passwordKey: DB_POSTGRESDB_PASSWORD

##########################
# Ingress Configurations #
##########################

# Configurations for the default Ingress resource for n8n.
#
# The default Ingress in this chart makes no assumptions of what Ingress controller is being used, it's up to you to define any specific annotations
# required by the controller implementation in your cluster.
#
# Ref: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  # Toggles the deployment of the default Ingress resource.
  enabled: true
  # Specifies the ingress controller implementation that will control this Ingress resource.
  # Not defining this would result in using the default ingress controller in the cluster, if there is one.
  className: ""
  # Additional labels to append to the Ingress resource.
  # Values are processed as Helm templates.
  labels: {}
  # Additional annotations to append to the Ingress resource.
  # Values are processed as Helm templates.
  annotations: {}
  # The domain on which the n8n service will be exposed via Ingress.
  # If set, overrides the host from .Values.configuration.externalUrl
  host: ""
  # The context path on which the n8n service will be accessible via Ingress.
  # If set, overrides the context path from .Values.configuration.externalUrl
  path: ""
  # Sets the ingress path type.
  # If you need to use ImplementationSpecific, make sure to set any annotations needed by the controller implementation.
  pathType: Prefix
  # Configures SSL termination on Ingress level.
  # Ref: https://kubernetes.github.io/ingress-nginx/examples/tls-termination/
  tls:
    # Feature toggle for SSL termination. Disabled by default.
    enabled: false
    # Name of a Kubernetes Secret object with the key and certificate.
    # If TLS is enabled, it's required to be provided, depending on the deployment.
    # This could be an existing Secret or one that is not yet created.
    secretName: ""
  # List of additional hostnames to append to the Ingress resource.
  # Values are processed as Helm templates.
  extraHosts: []
  # List of additional TLS records to append to the Ingress resource.
  # Values are processed as Helm templates.
  extraTLS: []

##########################
# Service Configurations #
##########################

# Configurations for n8n Service.
# Ref: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # Enables or disables the Service deployment
  enabled: true
  # Additional labels to append to the Service resource.
  # Values are processed as Helm templates.
  labels: {}
  # Additional annotations to append to the Service resource.
  # Values are processed as Helm templates.
  annotations: {}
  # Service type
  # Ref: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # Ports exposed by the Service.
  # Note: If you want to add additional ports, use .Values.service.extraPorts.
  ports:
    # Port mapped to n8n HTTP API.
    http: 5678
  # Exposes the Service on a specific node port on the host machine when "serviceType: NodePort"
  # If left undefined, K8S will pick a random port from the node port range of the cluster.
  nodePort: ""
  # Defines the policy for treating external ingress traffic.
  # By default, Cluster does not preserve client IPs. Change to Local to preserve them.
  # See https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip
  externalTrafficPolicy: ""
  # NodePort used by external load balancers when the external traffic policy is set to Local.
  # By default, Kubernetes will assign a random port, use this to override it.
  healthCheckNodePort: ""
  # Defines the class that should select a particular load balancer implementation.
  # By default, Kubernetes will assign the cluster default implementation, use this to override it.
  # Ref: https://kubernetes.io/docs/concepts/services-networking/service/#load-balancer-class
  loadBalancerClass: ""
  # Source IP ranges for restricting external ingress traffic
  loadBalancerSourceRanges: []
  # External IP addresses at which the Service will be exposed
  # Ref: https://kubernetes.io/docs/concepts/services-networking/service/#external-ips
  externalIPs: []
  # Additional ports to expose with the Service.
  extraPorts: []

##############################
# Persistence Configurations #
##############################

persistence:
  # Toggles the persistence of n8n data.
  # - If enabled, the Deployment will use a PVC template and rely on the CSI to dynamically provision Persistent Volumes.
  # - If disabled, it falls back to an emptyDir volume unless an existing PVC is provided with .Values.persistence.existingVolumeClaim.
  enabled: true

  # Storage location inside the container where the PersistenceClaimVolume will be mounted at.
  # The value is processed as a Helm template.
  path: /var/lib/graphrag/n8n

  # Configurations for PVC persistence.
  # By default, the PVC does not declare a particular storage class, allowing the CSI to select the default storage class in the cluster.
  # Ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
  volumeClaim:
    # Additional labels to add to the PVC.
    # Values are processed as Helm templates.
    labels: {}
    # Additional annotations to add to the PVC template.
    # Values are processed as Helm templates.
    annotations: {}
    # Specification for a PVC to be created for the n8n Deployment.
    # Values are processed as Helm templates.
    # Tune the spec according to your needs.
    spec:
      # To define a particular storage class, uncomment the following line and provide the name of the desired class.
      # storageClassName: standard
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi

  # Existing PersistentVolumeClaim to attach to the n8n Deployment for persistent storage.
  # Providing an existing PVC will disable the creation of the default PVC in this chart.
  # Value is processed as a Helm template.
  existingVolumeClaim: ""

  # Configurations for an emptyDir volume to be used for data storage by the Deployment.
  # Used when the persistence is disabled with .Values.persistence.enabled and no existing PVC is provided.
  # Ref: https://kubernetes.io/docs/concepts/storage/ephemeral-volumes/
  emptyDir:
    # Default emptyDir limit, override to your needs.
    sizeLimit: 1Gi

# Configurations for an emptyDir volume for the /tmp folder.
# Because the default security context in .Values.securityContext configures the root filesystem to be in read-only mode, certain N8N features
# cannot create and write files in /tmp. If you don't use a read-only root filesystem, you can disable this with .Values.tempVolume.enabled
tempVolume:
  # Toggles the temp folder emptyDir volume creation.
  # - If enabled, the Deployment will use an emptyDir volume for /tmp.
  # - If disabled, the chart won't create and mount ephemeral volumes for /tmp.
  enabled: true

  # Configurations for an emptyDir volume to be used for /tmp.
  # Ref: https://kubernetes.io/docs/concepts/storage/ephemeral-volumes/
  emptyDir:
    # Default emptyDir limit, override to your needs.
    sizeLimit: 128Mi

#############################
# Deployment Configurations #
#############################

# Configures the strategy of updating Deployment Pods.
# Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#updating-a-deployment
updateStrategy:
  type: Recreate

# Changes the maximum number of revisions that are kept.
revisionHistoryLimit: 10

# Grace period in seconds before terminating the Pods.
# Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#pod-termination
terminationGracePeriodSeconds: 120

# Toggles the auto-mounting of API credentials token into the Pods.
# Enable this if you need to contact either the API server or need web identity credentials for federated authentication in cloud APIs.
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#opt-out-of-api-credential-automounting
automountServiceAccountToken: false

# Overrides the default Kubernetes scheduler.
# See https://kubernetes.io/docs/tasks/extend-kubernetes/configure-multiple-schedulers/#specify-schedulers-for-pods
schedulerName: ""

# Overrides the Pod's DNS settings.
# Ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
dnsConfig: {}

# Defines the Pod's policy for DNS resolution.
# Ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
dnsPolicy: ""

# Name of an existing PriorityClass to assign, defining the importance of the pods compared to other pods in the cluster.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/
priorityClassName: ""

# Overrides the default n8n container command.
# Use only for troubleshooting!
# See https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/
command: []

# Overrides the default n8n container command's arguments.
# Use only for troubleshooting!
# See https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/
args: []

# Ports used by the n8n container
# Note: If you want to add additional ports, use .Values.extraContainerPorts.
containerPorts:
  # Port mapped to n8n listener.
  http: 5678

# Additional labels to append to the Pod definition.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# Additional annotations to append to the Pod definition.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}

###################################
# Security Context Configurations #
###################################

# Defines privilege and access control settings for all containers in the n8n Pod.
# See https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# Defines privilege and access control settings for the container running n8n.
# See https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

#############################
# Scheduling Configurations #
#############################

# Selector labels to match when selecting nodes.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector
# See https://kubernetes.io/docs/tasks/configure-pod-container/assign-pods-nodes/
nodeSelector: {}

# Node and pod affinity and anti-affinity configurations for constraining the Pod scheduling.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
affinity: {}

# Default podAntiAffinity rule ensuring that n8n pods are scheduled on different Kubernetes nodes.
#
# Possible values for .Values.podAntiAffinity.preset are:
# - "soft" (default) - Configures a preferredDuringSchedulingIgnoredDuringExecution rule.
# - "hard" - Configures a requiredDuringSchedulingIgnoredDuringExecution rule.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
podAntiAffinity:
  enabled: true
  preset: soft
  topology: kubernetes.io/hostname

# List of taint tolerations.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
tolerations: []

# Configurations for spreading Pods across different failure domains.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#pod-topology-spread-constraints
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
topologySpreadConstraints: []

##########################
# Resource Configuration #
##########################

# Resource configurations for the n8n containers.
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/assign-pods-nodes/
# Ref: https://docs.n8n.io/hosting/installation/server-setups/google-kubernetes-engine/#pod-resources
resources:
  limits:
    memory: 512Mi
  requests:
    memory: 256Mi
    cpu: 100m

#########################
# Probes Configurations #
#########################

# Ref: https://kubernetes.io/docs/concepts/configuration/liveness-readiness-startup-probes/
# Ref: https://docs.n8n.io/hosting/logging-monitoring/monitoring/#healthz-and-healthzreadiness

# Configurations for the n8n container startup probe.
startupProbe:
  httpGet:
    path: /healthz/readiness
    port: http
    scheme: HTTP
  failureThreshold: 300
  timeoutSeconds: 1
  periodSeconds: 3

# Configurations for the n8n container readiness probe.
readinessProbe:
  httpGet:
    path: /healthz/readiness
    port: http
    scheme: HTTP
  timeoutSeconds: 5
  periodSeconds: 10

# Configurations for the n8n container liveness probe.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
    scheme: HTTP
  initialDelaySeconds: 60
  timeoutSeconds: 5
  periodSeconds: 10

########################################
# Additional Deployment Configurations #
########################################

# Additional environment variables to be set for the n8n containers.
# Values are processed as Helm templates.
extraEnvFrom: []

# Additional environment variables to be set for the n8n containers.
# Values are processed as Helm templates.
extraEnv: []

# Additional volumes to be set for the n8n Pod.
# Values are processed as Helm templates.
extraVolumes: []

# Additional volume mounts to be set for the n8n containers.
# Values are processed as Helm templates.
extraVolumeMounts: []

# Additional init containers to be inserted after the provisioning init containers.
# Values are processed as Helm templates.
extraInitContainers: []

# Additional n8n container ports to expose.
extraContainerPorts: {}

# Additional containers to insert into the n8n Pod, e.g. sidecar containers
# Values are processed as Helm templates.
extraContainers: []

########################################
# Pod Disruption Budget Configurations #
########################################

# Configurations for n8n default Pod Disruption Budget.
# Ref: https://kubernetes.io/docs/concepts/workloads/pods/disruptions/#pod-disruption-budgets
podDisruptionBudget:
  enabled: true
  minAvailable: 51%
  maxUnavailable: ""

##################################
# Service Account Configurations #
##################################

# Configurations for the default ServiceAccount for n8n.
# Ref: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a ServiceAccount should be created for n8n.
  create: false

  # The name of the ServiceAccount to use.
  #
  # There are three cases to be aware of when using this:
  # - If not set and create is true, a name is generated using the fullname template
  # - If set and create is true, it will use the provided name when creating the ServiceAccount
  # - If set but create is false, it will use the provided ServiceAccount.
  name: ""

  # If .Values.serviceAccount.create is true, insert additional annotations to the created ServiceAccount.
  # Values are processed as Helm templates.
  annotations: {}

#################################
# Additional Kubernetes Objects #
#################################

# Additional objects to insert along with the release.
# Values are processed as Helm templates with tpl function.
# Ref: https://helm.sh/docs/howto/charts_tips_and_tricks/#using-the-tpl-function
extraObjects: []
