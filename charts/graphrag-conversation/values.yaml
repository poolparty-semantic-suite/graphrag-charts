###############################################################################
# Main configuration file                                                     #
# To override single property use --set                                       #
# To override multiple, provide another values-override.yaml with the -f flag #
# See https://helm.sh/docs/chart_template_guide/values_files/                 #
###############################################################################

#########################
# Global Configurations #
#########################

global:
  # Overrides image.registry
  # Can be used to override it globally when using umbrella charts.
  imageRegistry: ""

  # Inserts additional pull secret references together along with any from .Values.image.pullSecrets
  # Can be used to override it globally when using umbrella charts.
  # Values are processed as Helm templates.
  # Ref: https://kubernetes.io/docs/concepts/configuration/secret/#using-imagepullsecrets
  #
  # Example:
  # imagePullSecrets:
  #   - name: my-pull-secret
  imagePullSecrets: []

###############################
#   Metadata Configurations   #
# Naming and labels overrides #
###############################

# Overrides the name of the chart affecting the names of the GraphRAG Conversation resources.
nameOverride: ""

# Overrides the naming of all GraphRAG Conversation resources, effectively removing the chart's name and the release name prefix.
# This override takes precedence over anything in .Values.nameOverride
fullnameOverride: ""

# Overrides the deployment namespace in case of multi-namespace deployments, for example when using umbrella charts where some sub-charts should be
# deployed in different namespaces.
# This affects every resource deployed by this chart.
# The default value is .Release.Namespace if this is left unspecified.
namespaceOverride: ""

# Additional common labels to add to all GraphRAG Conversation resources.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
#
# Example:
# labels:
#   foo: bar
#   some-label: {{ .Values.someValue }}
labels: {}

# Additional common annotations to add to all GraphRAG Conversation resources.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
#
# Example:
# annotations:
#   foo: bar
#   some-annotation: {{ .Values.someValue }}
annotations: {}

##############################################
# GraphRAG Conversation Image Configurations #
##############################################

# Image configurations for GraphRAG Conversation service.
# Ref: https://kubernetes.io/docs/concepts/containers/images/
image:
  # The registry that hosts the GraphRAG Conversation image.
  # The default is to pull it from the official Docker registry, but this can be overridden to pull from other public or private registries.
  registry: maven.ontotext.com

  # The repository name of the GraphRAG Conversation image.
  repository: graphrag-conversation

  # Image tag that corresponds to the version of GraphRAG Conversation.
  # By default, the chart uses .Chart.AppVersion to construct the full image name.
  # Use this to override the value from .Chart.AppVersion and effectively deploy a custom GraphRAG Conversation version.
  tag: ""

  # Expected SHA256 digest of the used GraphRAG Conversation image, e.g. "sha256@abc"
  # Use the digest to make sure you are always deploying the exact same GraphRAG Conversation image.
  # Defining this would override .Chart.AppVersion and image.tag
  digest: ""

  # Defines the policy for pulling images
  # Ref: https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy
  pullPolicy: IfNotPresent

  # Secrets for pulling GraphRAG Conversation's image from secured registries.
  # Values are processed as Helm templates.
  # Ref: https://kubernetes.io/docs/concepts/configuration/secret/#using-imagepullsecrets
  #
  # Example:
  # pullSecrets:
  #   - name: my-pull-secret
  pullSecrets: []

##########################
# Scaling Configurations #
##########################

# Number of GraphRAG Conversation pods to be deployed as part of the StatefulSet resource.
replicas: 1

# Horizontal Pod Autoscaler configuration that can automatically scale the number of GraphRAG Conversation pods based on
# resource utilization.
# Ref: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

########################################
# GraphRAG Conversation Configurations #
########################################

# GraphRAG Conversation runtime configuration settings.
# For reference, see https://gitlab.ontotext.com/graphwise-graphrag/graphrag-conversation
configuration:

  # GraphRAG Conversation properties to insert in the default ConfigMap.
  # Values are processed as Helm templates.
  #
  # Example:
  # properties:
  #   spring.datasource.url: "jdbc:duckdb:/duckdbdata/graphrag-conversation.db"
  properties:
    sse.timeout.n8n.milliseconds: 300000
    spring.datasource.url: jdbc:duckdb:/var/lib/graphrag/conversation/duckdb.db
    n8n.workflows.volume.path: /var/lib/graphrag/conversation/workflows
    n8n.credentials.volume.path: /var/lib/graphrag/conversation/credentials
    springdoc.api-docs.server-url: /conversations
    springdoc.swagger-ui.config-url: /conversations/v3/api-docs/swagger-config
    springdoc.swagger-ui.url: /conversations/v3/api-docs
    server.forward-headers-strategy: framework
    # The following properties are env-specific, so they should be overridden.
    n8n.base.url: http://graphrag-workflows:5678
    n8n.chat.webhook.url: http://graphrag-workflows:5678/webhook/n8n/chat?questionId={questionId}&conversationId={conversationId}&userId={userId}&question={question}
    spring.security.oauth2.resourceserver.jwt.jwk-set-uri: http://keycloak:8080/realms/graphrag/protocol/openid-connect/certs
    spring.security.oauth2.resourceserver.jwt.issuer-uri: https://auth.127.0.0.1.nip.io/realms/graphrag
    keycloak.health.url: http://keycloak:9000/health

  # Reference to existing ConfigMap or Secret resources containing configuration properties that will be included as environment variables.
  # Takes precedence over .Values.configuration.properties.
  # The references are processed as Helm templates.
  #
  # Example:
  # existingProperties:
  #   - configMapRef:
  #       name: custom-graphrag-conversation-properties
  #
  # Ref: https://kubernetes.io/docs/concepts/configuration/configmap/#using-configmaps-as-environment-variables
  # Ref: https://kubernetes.io/docs/concepts/configuration/secret/#using-secrets-as-environment-variables
  existingProperties: []

  # Default Java arguments with which GraphRAG Conversation instances will be launched.
  # The value is processed as a Helm template.
  # Ref: https://gitlab.ontotext.com/graphwise-graphrag/graphrag-conversation
  defaultJavaArguments: -XX:MaxRAMPercentage=85

  # Java arguments to append after .Values.configuration.defaultJavaArguments
  # Use this one to avoid overriding the default values.
  # The value is processed as a Helm template.
  javaArguments: ""

##########################
# Ingress Configurations #
##########################

# Configurations for the default Ingress resource for GraphRAG Conversation.
#
# The default Ingress in this chart makes no assumptions of what Ingress controller is being used, it's up to you to define any specific annotations
# required by the controller implementation in your cluster.
#
# Ref: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  # Toggles the deployment of the default Ingress resource.
  enabled: false
  # Specifies the ingress controller implementation that will control this Ingress resource.
  # Not defining this would result in using the default ingress controller in the cluster, if there is one.
  className: ""
  # Additional labels to append to the Ingress resource.
  # Values are processed as Helm templates.
  labels: {}
  # Additional annotations to append to the Ingress resource.
  # Values are processed as Helm templates.
  annotations: {}
  # Configures the hosts on which this Ingress is available.
  # Ref: https://kubernetes.io/docs/concepts/services-networking/ingress/#name-based-virtual-hosting
  #
  # Example:
  # hosts:
  #   - host: chart-example.local
  #     paths:
  #       - path: /
  #         pathType: ImplementationSpecific
  hosts: []
  # Configures SSL termination on Ingress level.
  # Ref: https://kubernetes.io/docs/concepts/services-networking/ingress/#tls
  #
  # Example:
  # tls:
  #   - secretName: chart-example-tls
  #     hosts:
  #       - chart-example.local
  tls: []

##########################
# Service Configurations #
##########################

# Configurations for GraphRAG Conversation Service.
# Ref: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # Enables or disables the Service deployment
  enabled: true
  # Additional labels to append to the Service resource.
  # Values are processed as Helm templates.
  labels: {}
  # Additional annotations to append to the Service resource.
  # Values are processed as Helm templates.
  annotations: {}
  # Service type
  # Ref: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # Ports exposed by the Service.
  # Note: If you want to add additional ports, use .Values.service.extraPorts.
  ports:
    # Port mapped to GraphRAG Conversation HTTP API.
    http: 8080
  # Exposes the Service on a specific node port on the host machine when "serviceType: NodePort"
  # If left undefined, K8S will pick a random port from the node port range of the cluster.
  nodePort: ""
  # Defines the policy for treating external ingress traffic.
  # By default, Cluster does not preserve client IPs. Change to Local to preserve them.
  # See https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip
  externalTrafficPolicy: ""
  # NodePort used by external load balancers when the external traffic policy is set to Local.
  # By default, Kubernetes will assign a random port, use this to override it.
  healthCheckNodePort: ""
  # Defines the class that should select a particular load balancer implementation.
  # By default, Kubernetes will assign the cluster default implementation, use this to override it.
  # Ref: https://kubernetes.io/docs/concepts/services-networking/service/#load-balancer-class
  loadBalancerClass: ""
  # Source IP ranges for restricting external ingress traffic
  loadBalancerSourceRanges: []
  # External IP addresses at which the Service will be exposed
  # Ref: https://kubernetes.io/docs/concepts/services-networking/service/#external-ips
  externalIPs: []
  # Additional ports to expose with the Service.
  extraPorts: []

# Configurations for GraphRAG Conversation headless Service.
# Ref: https://kubernetes.io/docs/concepts/services-networking/service/
headlessService:
  # Enables or disables the headless Service deployment.
  enabled: true
  # Additional labels to append to the headless Service
  # Values are processed as Helm templates.
  labels: {}
  # Additional annotations to append to the Service
  # Values are processed as Helm templates.
  annotations: {}
  # Ports exposed by the Service
  # Note: If you want to add additional ports, use .Values.headlessService.extraPorts.
  ports:
    # Port mapped to GraphRAG Conversation's HTTP API.
    http: 8080
  # Additional ports to expose with the Service.
  extraPorts: []

##############################
# Persistence Configurations #
##############################

persistence:
  # Toggles the persistence of GraphRAG Conversation data.
  # - If enabled, the StatefulSet will use a PVC template and rely on the CSI to dynamically provision Persistent Volumes.
  # - If disabled, it falls back to an emptyDir volume.
  enabled: true

  # Storage location inside the container where the PersistenceClaimVolume will be mounted at.
  # The value is processed as a Helm template.
  path: /var/lib/graphrag/conversation

  # Configurations for PVC based persistence.
  # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#volume-claim-templates
  # Ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
  volumeClaimTemplate:
    # Prefix used when naming the PVCs for the StatefulSet
    name: "storage"
    # Additional labels to add to the PVC template.
    # Values are processed as Helm templates.
    labels: {}
    # Additional annotations to add to the PVC template.
    # Values are processed as Helm templates.
    annotations: {}
    # Specification for a PVC to be created by the StatefulSet.
    # Tune according to your needs.
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi

  # Overrides the retention policy of the StatefulSet's PVC.
  # This requires Kubernetes v1.27 or greater.
  # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#persistentvolumeclaim-retention
  #
  # Example:
  # volumeClaimRetentionPolicy:
  #   whenScaled: Retain
  #   whenDeleted: Delete
  volumeClaimRetentionPolicy: {}

  # Configurations for an emptyDir volume to be used for data storage by the StatefulSet.
  # Used when the persistence is disabled with .Values.persistence.enabled
  # Ref: https://kubernetes.io/docs/concepts/storage/ephemeral-volumes/
  emptyDir:
    # Default emptyDir limit, override to your needs.
    sizeLimit: 1Gi

# Configurations for an emptyDir volume for the /tmp folder in each GraphRAG Conversation container.
# Because the default security context in .Values.securityContext configures the root filesystem to be in read-only mode, certain features
# cannot create and write files in /tmp. If you don't use a read-only root filesystem, you can disable this with .Values.tempVolume.enabled
tempVolume:
  # Toggles the temp folder emptyDir volume creation.
  # - If enabled, the StatefulSet will use an emptyDir volume for /tmp.
  # - If disabled, the chart won't create and mount ephemeral volumes for /tmp.
  enabled: true
  # Default location of the temp directory inside the container where the temp volume will be mounted.
  mountPath: /tmp
  # Configurations for an emptyDir volume to be used for /tmp.
  # Ref: https://kubernetes.io/docs/concepts/storage/ephemeral-volumes/
  emptyDir:
    # Default emptyDir limit, override to your needs.
    sizeLimit: 1Gi

##############################
# StatefulSet Configurations #
##############################

# Configures the strategy of updating StatefulSet Pods.
# Ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
updateStrategy:
  type: RollingUpdate

# Configures how Pods are created and scaled.
# Ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#pod-management-policies
podManagementPolicy: Parallel

# Changes the maximum number of revisions that are kept.
revisionHistoryLimit: 10

# Grace period in seconds before terminating the Pods.
# Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#pod-termination
terminationGracePeriodSeconds: 120

# Toggles the auto mounting of API credentials token into the Pods.
# Enable this if you need to contact either the API server or need web identity credentials for federated authentication in cloud APIs.
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#opt-out-of-api-credential-automounting
automountServiceAccountToken: false

# Overrides the default Kubernetes scheduler.
# See https://kubernetes.io/docs/tasks/extend-kubernetes/configure-multiple-schedulers/#specify-schedulers-for-pods
schedulerName: ""

# Overrides the Pod's DNS settings.
# Ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
dnsConfig: {}

# Defines the Pod's policy for DNS resolution.
# Ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
dnsPolicy: ""

# Name of an existing PriorityClass to assign, defining the importance of the pods compared to other pods in the cluster.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/
priorityClassName: ""

# Overrides the default GraphRAG Conversation container command.
# Use only for troubleshooting!
# See https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/
command: []

# Overrides the default GraphRAG Conversation container command's arguments.
# Use only for troubleshooting!
# See https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/
args: []

# Ports used by the GraphRAG Conversation container
# Note: If you want to add additional ports, use .Values.extraContainerPorts.
containerPorts:
  # Port mapped to GraphRAG Conversation HTTP API.
  http: 8080

# Additional labels to append to the Pod definition.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# Additional annotations to append to the Pod definition.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}

###################################
# Security Context Configurations #
###################################

# Defines privilege and access control settings for all containers in the GraphRAG Conversation Pod.
# See https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# Defines privilege and access control settings for the container running GraphRAG Conversation.
# See https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

#############################
# Scheduling Configurations #
#############################

# Selector labels to match when selecting nodes.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector
# See https://kubernetes.io/docs/tasks/configure-pod-container/assign-pods-nodes/
nodeSelector: {}

# Node and pod affinity & anti affinity configurations for constraining the Pod scheduling.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
affinity: {}

# Default podAntiAffinity rule ensuring that GraphRAG Conversation pods are scheduled on different Kubernetes nodes.
#
# Possible values for .Values.podAntiAffinity.preset are:
# - "soft" (default) - Configures a preferredDuringSchedulingIgnoredDuringExecution rule.
# - "hard" - Configures a requiredDuringSchedulingIgnoredDuringExecution rule.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
podAntiAffinity:
  enabled: true
  preset: soft
  topology: kubernetes.io/hostname

# List of taint tolerations.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
tolerations: []

# Configurations for spreading Pods across different failure domains.
# Values are processed as Helm templates.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#pod-topology-spread-constraints
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
topologySpreadConstraints: []

##########################
# Resource Configuration #
##########################

# Resource configurations for the GraphRAG Conversation containers.
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/assign-pods-nodes/
resources:
  limits:
    memory: 2Gi
  requests:
    memory: 2Gi
    cpu: 500m

#########################
# Probes Configurations #
#########################

# Ref: https://kubernetes.io/docs/concepts/configuration/liveness-readiness-startup-probes/

# Configurations for the GraphRAG Conversation container startup probe.
startupProbe:
  httpGet:
    path: /__gtg
    port: http
  failureThreshold: 300
  timeoutSeconds: 1
  periodSeconds: 3

# Configurations for the GraphRAG Conversation container readiness probe.
readinessProbe:
  httpGet:
    path: /__gtg
    port: http
  timeoutSeconds: 5
  periodSeconds: 10

# Configurations for the GraphRAG Conversation container liveness probe.
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 60
  timeoutSeconds: 5
  periodSeconds: 10

#########################################
# Additional StatefulSet Configurations #
#########################################

# Additional environment variables to be set for the GraphRAG Conversation containers.
# Values are processed as Helm templates.
extraEnvFrom: []

# Additional environment variables to be set for the GraphRAG Conversation containers.
# Values are processed as Helm templates.
extraEnv: []

# Additional volumes to be set for the GraphRAG Conversation Pod.
# Values are processed as Helm templates.
extraVolumes: []

# Additional volume mounts to be set for the GraphRAG Conversation containers.
# Values are processed as Helm templates.
extraVolumeMounts: []

# Additional volume claim templates to be set in GraphRAG Conversation's StatefulSet.
# Values are processed as Helm templates.
extraVolumeClaimTemplates: []

# Additional init containers to be inserted after the provisioning init containers.
# Values are processed as Helm templates.
extraInitContainers: []

# Additional GraphRAG Conversation container ports to expose.
extraContainerPorts: {}

# Additional containers to insert into the GraphRAG Conversation Pod, e.g. sidecar containers
# Values are processed as Helm templates.
extraContainers: []

########################################
# Pod Disruption Budget Configurations #
########################################

# Configurations for GraphRAG Conversation default Pod Disruption Budget.
# Ref: https://kubernetes.io/docs/concepts/workloads/pods/disruptions/#pod-disruption-budgets
podDisruptionBudget:
  enabled: true
  minAvailable: 51%
  maxUnavailable: ""

##################################
# Service Account Configurations #
##################################

# Configurations for the default ServiceAccount for GraphRAG Conversation.
# Ref: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a ServiceAccount should be created for GraphRAG Conversation.
  create: false

  # The name of the ServiceAccount to use.
  #
  # There are three cases to be aware of when using this:
  # - If not set and create is true, a name is generated using the fullname template
  # - If set and create is true, it will use the provided name when creating the ServiceAccount
  # - If set but create is false, it will use the provided ServiceAccount.
  name: ""

  # If .Values.serviceAccount.create is true, insert additional annotations to the created ServiceAccount.
  # Values are processed as Helm templates.
  annotations: {}

#################################
# Additional Kubernetes Objects #
#################################

# Additional objects to insert along with the release.
# Values are processed as Helm templates with tpl function.
# Ref: https://helm.sh/docs/howto/charts_tips_and_tricks/#using-the-tpl-function
extraObjects: []
