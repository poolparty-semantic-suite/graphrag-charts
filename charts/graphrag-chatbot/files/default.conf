{{- $chatbotPath := include "graphrag-chatbot.external-url.path" . | trimSuffix "/" | default "/" -}}
{{- $conversationPath := (include "graphrag-chatbot.conversation.proxy-context-path" .) | trimSuffix "/" -}}
{{- $conversationUrl := (include "graphrag-chatbot.conversation.proxy-url" .) | trimSuffix "/" -}}
server {
    listen       {{ .Values.containerPorts.http }};
    listen  [::]:{{ .Values.containerPorts.http }};
    server_name  graphrag_chatbot;

    root   /usr/share/nginx/html;

    client_max_body_size 100m;
    proxy_send_timeout 10m;
    proxy_read_timeout 10m;

    {{ if .Values.configuration.conversationProxy.enabled }}
    location {{ $conversationPath }}/ {
      proxy_pass {{ $conversationUrl }}/;
    }
    {{- end }}

    {{ if not (eq $chatbotPath "/") }}
    location = {{ $chatbotPath }} {
      return 301 {{ $chatbotPath }}/;
    }
    {{ end }}

    {{ if eq $chatbotPath "/" }}
    location {{ $chatbotPath }} {
      try_files $uri $uri/ /index.html;
    }
    {{ else }}
    location {{ $chatbotPath }}/ {
      rewrite ^{{ $chatbotPath }}/(.*)$ /$1 break;
      try_files $uri $uri/ /index.html;
    }
    {{ end }}

    # You can attach additional configurations inside the following directory and they will be merged with this one.
    include /etc/nginx/includes/graphrag/*.conf;
}
