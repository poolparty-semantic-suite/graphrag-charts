{{- if .Values.serviceAccount.create -}}
{{- $saAnnotations := mergeOverwrite (deepCopy .Values.annotations) .Values.serviceAccount.annotations -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "graphrag-chatbot.serviceAccountName" . }}
  namespace: {{ include "graphrag-chatbot.namespace" . }}
  labels:
    {{- include "graphrag-chatbot.labels" . | nindent 4 }}
  {{- with $saAnnotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
{{- end }}
