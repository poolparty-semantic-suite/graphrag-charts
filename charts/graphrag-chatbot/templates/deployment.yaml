apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "graphrag-chatbot.fullname" . }}
  namespace: {{ include "graphrag-chatbot.namespace" . }}
  labels:
    {{- include "graphrag-chatbot.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  strategy: {{ .Values.updateStrategy | toYaml | nindent 4 }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "graphrag-chatbot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "graphrag-chatbot.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
          {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      annotations:
        checksum/configmap: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/configmap-nginx: {{ include (print .Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
          {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "graphrag-chatbot.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- if .Values.schedulerName }}
      schedulerName: {{ .Values.schedulerName }}
      {{- end }}
      {{- with .Values.dnsConfig }}
      dnsConfig: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dnsPolicy }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      volumes:
        - name: nginx-default-conf
          configMap:
            name: {{ (tpl .Values.configuration.nginx.defaultConfConfigmap .) | default (include "graphrag-chatbot.fullname.configmap.nginx" .) }}
        {{- if .Values.chatbotConfigVolume.enabled }}
        - name: chatbot-config
          emptyDir:
            {{- .Values.chatbotConfigVolume.spec | toYaml | nindent 12 }}
        {{- end }}
        {{- if .Values.nginxCacheTempVolume.enabled }}
        - name: nginx-cache
          emptyDir:
            {{- .Values.nginxCacheTempVolume.spec | toYaml | nindent 12 }}
        {{- end }}
        {{- if .Values.runTempVolume.enabled }}
        - name: run-tmpfs
          emptyDir:
            {{- .Values.runTempVolume.spec | toYaml | nindent 12 }}
        {{- end }}
        {{- with .Values.extraVolumes }}
          {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity .Values.podAntiAffinity.enabled }}
      affinity:
        {{- if .Values.affinity  }}
          {{- tpl (toYaml .Values.affinity) $ | nindent 8 }}
        {{- end }}
        {{- if and .Values.podAntiAffinity.enabled (not .Values.affinity.podAntiAffinity) }}
        podAntiAffinity:
          {{- if eq .Values.podAntiAffinity.preset "soft" }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: {{ .Values.podAntiAffinity.topology }}
                labelSelector:
                  matchLabels:
                    {{- include "graphrag-chatbot.selectorLabels" . | nindent 20 }}
          {{- else if eq .Values.podAntiAffinity.preset "hard" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: {{ .Values.podAntiAffinity.topology }}
              labelSelector:
                matchLabels:
                  {{- include "graphrag-chatbot.selectorLabels" . | nindent 18 }}
          {{- else }}
            {{- fail (printf "Unknown podAntiAffinity preset '%s'" .Values.podAntiAffinity.preset) }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.global.imagePullSecrets .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- include "graphrag-chatbot.combinedImagePullSecrets" . | nindent 8 }}
      {{- end }}
      {{- if or .Values.chatbotConfigVolume.enabled .Values.extraInitContainers }}
      initContainers:
        - name: chatbot-config
          image: {{ include "graphrag-chatbot.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: chatbot-config
              mountPath: /tmp/config
          {{- with .Values.initContainerResources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.initContainerSecurityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          command: [ "bash", "-c" ]
          args:
            - |
              set -eu
              echo "Copying configuration files..."
              cp -r {{ .Values.chatbotConfigVolume.mountPath | trimSuffix "/" }}/* /tmp/config/
        {{- with .Values.extraInitContainers }}
          {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "graphrag-chatbot.name" . }}
          image: {{ include "graphrag-chatbot.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args: {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPorts.http }}
            {{- with .Values.extraContainerPorts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "graphrag-chatbot.fullname" . }}
          {{- with .Values.extraEnvFrom }}
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          {{- with .Values.extraEnv }}
          env: {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: nginx-default-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: {{ .Values.configuration.nginx.defaultConfConfigmapKey }}
            {{- if .Values.chatbotConfigVolume.enabled }}
            - name: chatbot-config
              mountPath: {{ .Values.chatbotConfigVolume.mountPath }}
            {{- end }}
            {{- if .Values.nginxCacheTempVolume.enabled }}
            - name: nginx-cache
              mountPath: {{ .Values.nginxCacheTempVolume.mountPath }}
            {{- end }}
            {{- if .Values.runTempVolume.enabled }}
            - name: run-tmpfs
              mountPath: {{ .Values.runTempVolume.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
              {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.extraContainers }}
          {{ tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
