name: CI - Pull Request
run-name: CI - Pull Request pipeline triggered by ${{ github.actor }}

on:
  # A pull request is opened, reopened, or when the head branch of the pull request is updated.
  pull_request:
    # Ignore when updating only documentation files.
    paths-ignore:
      - '**.md'
      - '**.gotmpl'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: setup_helm
        name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - id: setup_python
        name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: '3.x'
          check-latest: true

      - id: setup_chart_testing
        name: Set up chart testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - id: run_chart_testing
        name: Run chart-testing (lint)
        run: ct lint --all --chart-dirs charts/

      - id: run_helm_dependency_build
        name: Run helm dependency build
        working-directory: charts/graphrag/
        run: |
          helm dependency build
          helm template --debug --namespace graphrag graphrag . > output.yam

      - id: run_trivy_config
        name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: trivy.yaml
          hide-progress: false
